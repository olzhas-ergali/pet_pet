
  <!DOCTYPE html>
  <html lang="en">
    <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>Оптовая биржа товаров</title>
      <link rel="preconnect" href="https://fonts.googleapis.com" />
      <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
      <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Outfit:wght@300;400;500;600&display=swap"
        rel="stylesheet"
      />
      <script>
        try {
          var raw = localStorage.getItem('optbirja-ui-theme');
          if (raw) {
            var o = JSON.parse(raw);
            if (o && o.state && o.state.theme === 'dark') {
              document.documentElement.classList.add('dark');
            }
          }
        } catch (e) {}
      </script>
    </head>

    <body>
      <div id="root"></div>
      <script type="module" src="/src/main.tsx"></script>
    </body>
  </html>
